<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今日のEast Coastラッパー</title>
    <link rel="stylesheet" href="style.css?v=audio-preview" />
  </head>
  <body>
    <main class="app">
      <section class="rapper-card" aria-labelledby="app-title">
        <p class="eyebrow">1990-2005 East Coast</p>
        <h1 id="app-title">今日のEast Coastラッパー</h1>

        <figure class="photo-frame">
          <img
            id="rapperPhoto"
            src=""
            alt=""
            hidden
          />
          <figcaption id="photoCredit">ボタンを押すと写真が出ます</figcaption>
        </figure>

        <div class="result" aria-live="polite">
          <p id="rapperName" class="rapper-name">今日の1人を選ぼう</p>
          <p id="rapperEra" class="rapper-era">ボタンを押すと、写真と本人に関する話題が出ます。</p>
          <p id="message" class="message">
            East Coastの歴史を感じる短い話題をランダムで表示します。
          </p>
          <p id="audioStatus" class="audio-status">本人メインの公式プレビューが見つかれば数秒だけ流れます。</p>
        </div>

        <button id="drawButton" type="button">今日のラッパーを出す</button>
      </section>
    </main>

    <script src="script.js?v=audio-preview"></script>
  </body>
</html>
