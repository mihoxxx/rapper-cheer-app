<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Cheer App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="cheer-box" aria-labelledby="app-title">
        <p class="eyebrow">Today's boost</p>
        <h1 id="app-title">English Cheer App</h1>
        <p id="message" class="message" aria-live="polite">
          Tap the button to get a kind English message.
        </p>
        <button id="drawButton" type="button">Cheer me up</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
